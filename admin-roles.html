<script>
var session = LOSApp.boot('ADMIN');

function seedRolesIfEmpty(){
  var roles = LOS_DB.getConfigCollection('roleDefinitions');
  if(roles.length) return roles;
  roles = [
    {name:'Branch Initiator', description:'Case creation, security selection, document upload, CIBIL check', users:48, accessLevel:'Branch Level', maxApproval:0, stages:['Branch Initiation'], permissions:'Full Create, Limited Approve'},
    {name:'Credit Hub Controller', description:'Hub inward, FI assignment, deviation management', users:12, accessLevel:'Hub Level', maxApproval:0, stages:['Credit Hub'], permissions:'Receive, Assign, Deviate'},
    {name:'System Admin', description:'User management, configuration, audit', users:3, accessLevel:'System Level', maxApproval:0, stages:[], permissions:'Full Admin Access'}
  ];
  LOS_DB.saveConfigCollection('roleDefinitions', roles);
  return roles;
}

var ROLES = seedRolesIfEmpty();
var editingRoleName = null;

function renderRoles(){
  var tb = document.getElementById('rolesTableBody');
  tb.innerHTML = ROLES.map(function(r){
    return '<tr>'+
      '<td class="font-semibold text-slate-800 text-xs">'+r.name+'</td>'+
      '<td class="text-xs text-slate-600 max-w-xs">'+r.description+'</td>'+
      '<td class="text-center"><span class="chip chip-blue">'+(r.users||0)+'</span></td>'+
      '<td><span class="chip chip-purple">'+r.accessLevel+'</span></td>'+
      '<td class="text-xs text-slate-600">'+(r.permissions||'—')+'</td>'+
      '<td class="flex gap-1"><button data-modal-open="roleModal" onclick="openRoleModal(\''+r.name.replace(/'/g,"\\'")+'\')" class="btn-primary btn-sm">Edit</button><button onclick="alert(\'Cloned!\')" class="btn-outline btn-sm text-xs">Clone</button><a href="admin-permissions.html" class="btn-outline btn-sm text-xs">Perms</a></td>'+
    '</tr>';
  }).join('') || '<tr><td colspan="6" class="text-center text-slate-400 py-6">No roles yet</td></tr>';
}

function openRoleModal(name){
  editingRoleName = name;
  var r = name ? ROLES.find(function(x){return x.name===name}) : null;
  document.getElementById('mRoleName').value = r ? r.name : '';
  document.getElementById('mRoleDesc').value = r ? r.description : '';
  document.getElementById('mRoleAccessLevel').value = r ? r.accessLevel : document.getElementById('mRoleAccessLevel').options[0].value;
  document.getElementById('mRoleMaxApproval').value = r ? r.maxApproval : 0;
  document.querySelectorAll('#roleModal input[data-stage]').forEach(function(cb){
    cb.checked = r ? (r.stages||[]).indexOf(cb.getAttribute('data-stage')) !== -1 : false;
  });
}

document.getElementById('saveRoleBtn').addEventListener('click', function(){
  var name = document.getElementById('mRoleName').value.trim();
  if(!name){ alert('Role Name is required'); return; }
  var stages = Array.prototype.slice.call(document.querySelectorAll('#roleModal input[data-stage]:checked')).map(function(cb){return cb.getAttribute('data-stage')});
  var existing = editingRoleName ? ROLES.find(function(x){return x.name===editingRoleName}) : null;
  var record = {
    name: name,
    description: document.getElementById('mRoleDesc').value.trim(),
    accessLevel: document.getElementById('mRoleAccessLevel').value,
    maxApproval: Number(document.getElementById('mRoleMaxApproval').value) || 0,
    stages: stages,
    users: existing ? existing.users : 0,
    permissions: existing ? existing.permissions : 'Set via Permission Matrix'
  };
  var idx = ROLES.findIndex(function(x){return x.name===(editingRoleName||name)});
  if(idx >= 0) ROLES[idx] = record; else ROLES.push(record);
  LOS_DB.saveConfigCollection('roleDefinitions', ROLES);
  renderRoles();
  document.getElementById('roleModal').classList.remove('open');
});

renderRoles();
</script></body></html>
