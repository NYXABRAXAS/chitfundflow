<script>
var session = LOSApp.boot('ADMIN');

function seedUsersIfEmpty(){
  var users = LOS_DB.getConfigCollection('users');
  if(users.length) return users;
  users = [
    {empId:'EMP-1001', name:'Priya Ramachandran', role:'Branch Initiator', branch:'HO Chennai', email:'priya.r@mpc.in', mobile:'98401-11111', status:'Active', lastLogin:'16 Jan 09:12'},
    {empId:'EMP-1002', name:'Manoj Thangavel', role:'Branch Scrutinizer', branch:'Trichy Main', email:'manoj.t@mpc.in', mobile:'98401-22222', status:'Active', lastLogin:'16 Jan 08:45'},
    {empId:'EMP-1010', name:'Dr. Suresh Babu', role:'Credit Head', branch:'HO Chennai', email:'suresh.b@mpc.in', mobile:'98402-11111', status:'Active', lastLogin:'16 Jan 10:30'}
  ];
  LOS_DB.saveConfigCollection('users', users);
  return users;
}

var USERS = seedUsersIfEmpty();
var editingEmpId = null;

function chipForStatus(status){return status==='Active' ? 'chip-green' : 'chip-red'}

function renderUsers(){
  var tb = document.getElementById('usersTableBody');
  tb.innerHTML = USERS.map(function(u){
    return '<tr>'+
      '<td class="font-mono text-xs text-blue-700">'+u.empId+'</td>'+
      '<td class="font-medium text-xs">'+u.name+'</td>'+
      '<td><span class="chip chip-blue">'+u.role+'</span></td>'+
      '<td class="text-xs">'+u.branch+'</td>'+
      '<td class="text-xs text-slate-500">'+u.email+'</td>'+
      '<td class="text-xs">'+u.mobile+'</td>'+
      '<td><span class="chip '+chipForStatus(u.status)+'">'+u.status+'</span></td>'+
      '<td class="text-xs text-slate-500">'+(u.lastLogin||'--')+'</td>'+
      '<td class="flex gap-1 flex-wrap"><button data-modal-open="userModal" onclick="openUserModal(\''+u.empId+'\')" class="btn-primary btn-sm">Edit</button><button onclick="alert(\'Reset sent!\')" class="btn-outline btn-sm text-xs">Reset PWD</button><button onclick="alert(\'Deactivated!\')" class="btn-danger btn-sm text-xs">Deactivate</button></td>'+
    '</tr>';
  }).join('') || '<tr><td colspan="9" class="text-center text-slate-400 py-6">No users yet</td></tr>';
}

function nextEmpId(){
  var max = 1000;
  USERS.forEach(function(u){ var n = parseInt((u.empId||'').split('-')[1], 10); if(!isNaN(n) && n > max) max = n; });
  return 'EMP-' + (max + 1);
}

function openUserModal(empId){
  editingEmpId = empId;
  var u = empId ? USERS.find(function(x){return x.empId===empId}) : null;
  document.getElementById('mEmpId').value = u ? u.empId : nextEmpId();
  document.getElementById('mName').value = u ? u.name : '';
  document.getElementById('mEmail').value = u ? u.email : '';
  document.getElementById('mMobile').value = u ? u.mobile : '';
  document.getElementById('mRole').value = u ? u.role : document.getElementById('mRole').options[0].value;
  document.getElementById('mBranch').value = u ? u.branch : document.getElementById('mBranch').options[0].value;
  document.getElementById('mStatus').value = u ? u.status : 'Active';
  document.getElementById('mPassword').value = '';
}

document.getElementById('saveUserBtn').addEventListener('click', function(){
  var empId = document.getElementById('mEmpId').value.trim();
  var record = {
    empId: empId,
    name: document.getElementById('mName').value.trim(),
    email: document.getElementById('mEmail').value.trim(),
    mobile: document.getElementById('mMobile').value.trim(),
    role: document.getElementById('mRole').value,
    branch: document.getElementById('mBranch').value,
    status: document.getElementById('mStatus').value,
    lastLogin: (editingEmpId && USERS.find(function(x){return x.empId===editingEmpId})||{}).lastLogin || '--'
  };
  var idx = USERS.findIndex(function(x){return x.empId===empId});
  if(idx >= 0) USERS[idx] = record; else USERS.push(record);
  LOS_DB.saveConfigCollection('users', USERS);
  renderUsers();
  document.getElementById('userModal').classList.remove('open');
});

renderUsers();
</script></body></html>
